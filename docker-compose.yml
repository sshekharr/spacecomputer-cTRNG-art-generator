version: '3.8'

services:
  cosmic-art:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cosmic-art
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - cosmic-net

networks:
  cosmic-net:
    driver: bridge
